services:
  opa:
    image: openpolicyagent/opa:0.68.0
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: access_governance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
